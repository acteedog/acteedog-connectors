info:
  name: Fetch Event List
  type: http
  seq: 2

http:
  method: GET
  url: https://www.googleapis.com/calendar/v3/calendars/{{email}}/events?timeMin=2026-03-16T00:00:00Z&timeMax=2026-03-17T00:00:00Z&singleEvents=true&orderBy=startTime
  params:
    - name: timeMin
      value: 2026-03-16T00:00:00Z
      type: query
    - name: timeMax
      value: 2026-03-17T00:00:00Z
      type: query
    - name: singleEvents
      value: "true"
      type: query
    - name: orderBy
      value: startTime
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
