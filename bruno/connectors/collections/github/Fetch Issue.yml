info:
  name: Fetch Issue
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/repos/{{owner}}/{{repo}}/issues/{{number}}"
  auth: inherit

runtime:
  variables:
    - name: owner
      value: ymtdzzz
    - name: repo
      value: otel-tui
    - name: number
      value: "245"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
