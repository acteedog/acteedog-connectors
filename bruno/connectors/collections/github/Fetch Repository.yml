info:
  name: Fetch Repository
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/repos/{{owner}}/{{repo}}"
  auth: inherit

runtime:
  variables:
    - name: owner
      value: acteedog
    - name: repo
      value: acteedog-release

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
