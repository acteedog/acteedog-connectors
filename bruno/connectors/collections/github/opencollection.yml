opencollection: 1.0.0

info:
  name: github
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: Accept
      value: application/vnd.github+json
    - name: User-Agent
      value: acteedog/1.0.0
  auth:
    type: apikey
    key: Authorization
    value: token {{token}}
    placement: header
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    presets:
      request:
        type: http
        url: https://api.github.com
