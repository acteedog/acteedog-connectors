info:
  name: Fetch PR
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/repos/{{owner}}/{{repo}}/pulls/{{number}}"
  auth: inherit

runtime:
  variables:
    - name: owner
      value: ymtdzzz
    - name: repo
      value: otel-tui
    - name: number
      value: "426"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
