info:
  name: Fetch Project
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/rest/api/3/project/{{project_id}}"
  auth: inherit

runtime:
  variables:
    - name: date
      value: 2026-03-10
