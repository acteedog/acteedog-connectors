info:
  name: Fetch Activities
  type: http
  seq: 1

http:
  method: GET
  url: '{{baseUrl}}/rest/api/3/search/jql?jql=updated >= "{{date_from}}" AND updated < "{{date_to}}" AND project IN ("{{project_id}}") ORDER BY created DESC&fields=*all&expand=changelog&maxResults=5000'
  params:
    - name: jql
      value: updated >= "{{date_from}}" AND updated < "{{date_to}}" AND project IN ("{{project_id}}") ORDER BY created DESC
      type: query
    - name: fields
      value: "*all"
      type: query
    - name: expand
      value: changelog
      type: query
    - name: maxResults
      value: "5000"
      type: query
  auth: inherit

runtime:
  variables:
    - name: date
      value: 2026-03-10
    - name: project_id
      value: "10000"
  scripts:
    - type: before-request
      code: |-
        const target = new Date(bru.getRequestVar("date"));

        const dateFrom = target.toISOString().slice(0, 10);

        const next = new Date(target);
        next.setDate(next.getDate() + 1);
        const dateTo = next.toISOString().slice(0, 10);

        bru.setVar("date_from", dateFrom);
        bru.setVar("date_to", dateTo);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
