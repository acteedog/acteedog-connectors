info:
  name: Fetch Thread
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/conversations.replies?channel={{channel_id}}&ts={{thread_ts}}&limit=1"
  params:
    - name: channel
      value: "{{channel_id}}"
      type: query
    - name: ts
      value: "{{thread_ts}}"
      type: query
    - name: limit
      value: "1"
      type: query
  auth: inherit

runtime:
  variables:
    - name: page
      value: "1"
    - name: date
      value: 2026-02-18
    - name: thread_ts
      value: "1771421596.141479"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
