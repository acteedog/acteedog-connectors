info:
  name: Fetch Channel
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/conversations.info?channel={{channel_id}}"
  params:
    - name: channel
      value: "{{channel_id}}"
      type: query
  auth: inherit

runtime:
  variables:
    - name: page
      value: "1"
    - name: date
      value: 2026-02-18

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
