info:
  name: Fetch Activities
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/search.messages?query=from:@{{userId}} on:{{date}}&page={{page}}"
  params:
    - name: query
      value: from:@{{userId}} on:{{date}}
      type: query
    - name: page
      value: "{{page}}"
      type: query
  auth: inherit

runtime:
  variables:
    - name: page
      value: "1"
    - name: date
      value: 2026-02-18

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
