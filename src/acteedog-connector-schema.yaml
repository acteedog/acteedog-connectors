version: v1-draft

exports:
  GetConfigSchema:
    description: Get JSON Schema for user configuration
    output:
      contentType: application/json
      $ref: "#/components/schemas/ConfigSchema"

  FetchActivities:
    description: Fetch activities from external service
    input:
      contentType: application/json
      $ref: "#/components/schemas/FetchRequest"
    output:
      contentType: application/json
      $ref: "#/components/schemas/FetchResponse"

  EnrichContext:
    description: Enrich context with additional information
    input:
      contentType: application/json
      $ref: "#/components/schemas/EnrichRequest"
    output:
      contentType: application/json
      $ref: "#/components/schemas/EnrichResponse"

  TestConnection:
    description: Test connection to the external service
    input:
      contentType: application/json
      $ref: "#/components/schemas/TestConnectionRequest"

  MatchContext:
    description: Match contexts based on provided URLs
    input:
      contentType: application/json
      $ref: "#/components/schemas/MatchContextRequest"
    output:
      contentType: application/json
      $ref: "#/components/schemas/MatchContextResponse"

  BuildOAuthUrl:
    description: "Build OAuth authorization URL (including PKCE generation)"
    input:
      contentType: application/json
      $ref: "#/components/schemas/OAuthUrlRequest"
    output:
      contentType: application/json
      $ref: "#/components/schemas/OAuthUrlResponse"

  ExchangeOAuthCode:
    description: "Exchange OAuth authorization code for access token"
    input:
      contentType: application/json
      $ref: "#/components/schemas/OAuthCodeExchangeRequest"
    output:
      contentType: application/json
      $ref: "#/components/schemas/OAuthTokenResponse"

  StartDeviceFlow:
    description: "Start OAuth Device Flow and retrieve device/user codes"
    output:
      contentType: application/json
      $ref: "#/components/schemas/DeviceFlowResponse"

  PollDeviceToken:
    description: "Poll for OAuth Device Flow token (called repeatedly by host until token is issued or error occurs)"
    input:
      contentType: application/json
      $ref: "#/components/schemas/DeviceTokenRequest"
    output:
      contentType: application/json
      $ref: "#/components/schemas/OAuthTokenResponse"

components:
  schemas:
    AuthField:
      required:
        - key
        - name
      properties:
        key:
          type: string
          description: "Field key name in credentials"
        name:
          type: string
          description: "Display name for UI"
        secret:
          type: boolean
          description: "If true, the value is stored in OS keychain instead of config file"

    # enum must be a top-level standalone definition in XTP v1-draft
    AuthMethodType:
      enum:
        - bearer
        - basic
        - oauth_web
        - oauth_device

    AuthMethod:
      required:
        - id
        - type
        - label
        - fields
      properties:
        id:
          type: string
          description: "Auth method identifier (e.g. 'token', 'basic', 'oauth')"
        type:
          $ref: "#/components/schemas/AuthMethodType"
        label:
          type: string
          description: "Display label for UI"
        description:
          type: string
          description: "Description of the auth method (required scopes, how to obtain tokens, etc.)"
        fields:
          type: array
          items:
            $ref: "#/components/schemas/AuthField"
          description: "Fields the user must configure. Empty for methods like OAuth where no user input is needed."

    ConfigSchema:
      required:
        - type
        - properties
      properties:
        type:
          type: string
        properties:
          type: object
        required:
          type: array
          items:
            type: string
        auth_methods:
          type: array
          items:
            $ref: "#/components/schemas/AuthMethod"

    FetchRequest:
      required:
        - config
        - params
      properties:
        config:
          type: object
        params:
          $ref: "#/components/schemas/FetchParams"

    FetchParams:
      required:
        - targetDate
      properties:
        targetDate:
          type: string

    FetchResponse:
      required:
        - activities
      properties:
        activities:
          type: array
          items:
            $ref: "#/components/schemas/Activity"

    Activity:
      required:
        - id
        - timestamp
        - title
        - description
        - source
        - activityType
        - contexts
        - metadata
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        title:
          type: string
        description:
          type: string
        source:
          type: string
        activityType:
          type: string
        url:
          type: string
        metadata:
          type: object
        contexts:
          type: array
          items:
            $ref: "#/components/schemas/Context"

    Context:
      required:
        - id
        - name
        - connectorId
        - resourceType
        - parentId
        - metadata
      properties:
        id:
          type: string
        name:
          type: string
        parentId:
          type: string
        connectorId:
          type: string
        resourceType:
          type: string
          description: "Resource type (e.g., 'source', 'repository', 'pull_request', 'issue', 'channel', 'thread')"
        title:
          type: string
        description:
          type: string
        url:
          type: string
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EnrichRequest:
      required:
        - config
        - context
      properties:
        config:
          type: object
        context:
          $ref: "#/components/schemas/Context"

    EnrichResponse:
      required:
        - context
      properties:
        context:
          $ref: "#/components/schemas/Context"

    MatchContextRequest:
      required:
        - config
        - urls
      properties:
        config:
          type: object
        urls:
          type: array
          items:
            type: string

    MatchContextResponse:
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/MatchContextResult"

    MatchContextResult:
      required:
        - url
        - contexts
      properties:
        url:
          type: string
        contexts:
          type: array
          items:
            $ref: "#/components/schemas/Context"

    TestConnectionRequest:
      required:
        - config
      properties:
        config:
          type: object
          description: "Connector configuration including credentials"

    OAuthUrlRequest:
      required:
        - redirect_uri
      properties:
        redirect_uri:
          type: string
          description: "Loopback redirect URI provided by acteedog host"

    OAuthUrlResponse:
      required:
        - url
        - state
      properties:
        url:
          type: string
          description: "Full authorization URL to open in browser"
        state:
          type: string
          description: "CSRF token generated by connector; host must verify this in the callback"

    OAuthCodeExchangeRequest:
      required:
        - code
        - state
        - redirect_uri
      properties:
        code:
          type: string
          description: "Authorization code received in callback"
        state:
          type: string
          description: "State parameter received in callback (for connector to verify internally if needed)"
        redirect_uri:
          type: string
          description: "Same redirect_uri used in the authorization request"

    OAuthTokenResponse:
      required:
        - access_token
      properties:
        access_token:
          type: string
          description: "Empty string means authorization_pending (Device Flow polling only)"
        refresh_token:
          type: string
          description: "Present only if the provider issues refresh tokens"
        expires_in:
          type: integer
          description: "Access token lifetime in seconds. Absent means non-expiring."

    DeviceFlowResponse:
      required:
        - device_code
        - user_code
        - verification_uri
        - expires_in
        - interval
      properties:
        device_code:
          type: string
          description: "Device verification code used to poll for the token"
        user_code:
          type: string
          description: "Code the user must enter at verification_uri"
        verification_uri:
          type: string
          description: "URL where the user enters the user_code"
        expires_in:
          type: integer
          description: "Seconds until device_code and user_code expire"
        interval:
          type: integer
          description: "Minimum seconds between polling requests"

    DeviceTokenRequest:
      required:
        - device_code
      properties:
        device_code:
          type: string
          description: "Device verification code received from StartDeviceFlow"
